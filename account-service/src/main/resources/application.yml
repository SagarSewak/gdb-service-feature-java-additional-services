server:
  port: ${PORT:8001}

spring:
  application:
    name: account-service
  output:
    ansi:
      enabled: ALWAYS
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/gdb_accounts_db}
    username: ${DATABASE_USER:postgres}
    password: ${DATABASE_PASSWORD:anil}
    driver-class-name: org.postgresql.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    validate-on-migrate: false

logging:
  level:
    root: INFO
    com.gdb.account: DEBUG
  pattern:
    console: "%clr(%d{yyyy-MM-dd HH:mm:ss}){faint} %clr(${LOG_LEVEL_PATTERN:-%5p}) %clr(${PID:- }){magenta} %clr(---){faint} %clr([%15.15t]){faint} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m%n${LOG_EXCEPTION_CONVERSION_WORD:-%wEx}"
  file:
    name: logs/account-service.log
    max-size: 10MB
    max-history: 30

# External Service URLs
external:
  aadhar-service:
    url: ${AADHAR_SERVICE_URL:http://localhost:8005}
  company-service:
    url: ${COMPANY_SERVICE_URL:http://localhost:8006}
  notification-service:
    url: ${NOTIFICATION_SERVICE_URL:http://localhost:8007}
  auth-service:
    url: ${AUTH_SERVICE_URL:http://localhost:8004}

# Swagger/OpenAPI Configuration
springdoc:
  api-docs:
    path: /api/v1/api-docs
  swagger-ui:
    path: /api/v1/docs
    operations-sorter: alpha
    tags-sorter: alpha
  packages-to-scan: com.gdb.account.controller
