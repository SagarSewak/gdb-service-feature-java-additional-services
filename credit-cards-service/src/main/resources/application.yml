server:
  port: ${PORT:8009}

spring:
  application:
    name: credit-cards-service
  output:
    ansi:
      enabled: ALWAYS
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/gdb_creditcards_db}
    username: ${DATABASE_USER:postgres}
    password: ${DATABASE_PASSWORD:java}
    driver-class-name: org.postgresql.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    validate-on-migrate: false

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    root: INFO
    com.gdb.creditcards: DEBUG
  pattern:
    console: "%clr(%d{yyyy-MM-dd HH:mm:ss}){faint} %clr(${LOG_LEVEL_PATTERN:-%5p}) %clr(${PID:- }){magenta} %clr(---){faint} %clr([%15.15t]){faint} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m%n${LOG_EXCEPTION_CONVERSION_WORD:-%wEx}"
  file:
    name: logs/credit-cards-service.log
    max-size: 10MB
    max-history: 30

springdoc:
  api-docs:
    path: /api/v1/api-docs
  swagger-ui:
    path: /api/v1/docs
    operations-sorter: alpha
    tags-sorter: alpha
  packages-to-scan: com.gdb.creditcards.controller

app:
  services:
    auth-url: ${AUTH_SERVICE_URL:http://localhost:8004}
    accounts-url: ${ACCOUNTS_SERVICE_URL:http://localhost:8001}
